version: '3.9'

services:
  client:
    build: ./client
    volumes:
      - ./client:/client
      - /client/node_modules
    networks:
      - app
    depends_on:
      - gateway
    ports:
      - "3000:3000"  
  gateway: 
    build: ./server/gateway
    volumes:
      -  ./server/gateway:/gateway
      -  /gateway/node_modules
    environment:
      PORT: 4000
      CHOKIDAR_USEPOLLING: "true"
    networks:
      - app
    depends_on:
      user-service:
        condition: service_healthy
      post-service:
        condition: service_healthy
    ports:
      - "4000:4000"
  user-service:
    build: ./server/user-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4002"]
      interval: 5s
      timeout: 2s
      retries: 5
    volumes:
      -  ./server/user-service:/user-service
      -  /user-service/node_modules
    environment:
      PORT: 4002
      DATABASE_URL: ${DATABASE_URL_USER_SERVICE}
      CHOKIDAR_USEPOLLING: "true"  
    networks:
      - app
      - app-db
    depends_on:
      - user-db
    ports:
      - "4002:4002"
  post-service:
    build: ./server/post-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001"]
      interval: 5s
      timeout: 2s
      retries: 5
    volumes:
      -  ./server/post-service:/post-service
      -  /post-service/node_modules
    environment:
      PORT: 4001
      DATABASE_URL: ${DATABASE_URL_POST_SERVICE}
      CHOKIDAR_USEPOLLING: "true"
    networks:
      - app
      - app-db
    depends_on:
      - post-db
    ports:
      - "4001:4001"
  user-db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: qwerty123
      POSTGRES_DB: user
    volumes:
      - postgres-user-data:/var/lib/postgresql/data

    networks:
      - app-db
    ports:
      - "5433:5432"
  post-db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: qwerty123
      POSTGRES_DB: post
    volumes:
      - postgres-post-data:/var/lib/postgresql/data
    networks:
      - app-db
    ports:
      - "5434:5433"





volumes:
   postgres-user-data:
   postgres-post-data:


networks:
  app:
  app-db:


